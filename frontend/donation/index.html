<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>โดเนท - KIM.TH Donation System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>💝 KIM.TH Donation System</h1>
      <p>สนับสนุนสตรีมเมอร์ของคุณ</p>
    </header>

    <main>
      <form id="donationForm" class="donation-form">
        <div class="form-group">
          <label for="donorName">ชื่อผู้โดเนท *</label>
          <input 
            type="text" 
            id="donorName" 
            name="donorName" 
            placeholder="ป้อนชื่อของคุณ"
            required
          >
        </div>

        <div class="form-group">
          <label for="amount">จำนวนเงิน (บาท) *</label>
          <input 
            type="number" 
            id="amount" 
            name="amount" 
            placeholder="เช่น 100"
            min="1"
            step="1"
            required
          >
        </div>

        <div class="form-group">
          <label for="message">ข้อความ</label>
          <textarea 
            id="message" 
            name="message" 
            placeholder="เขียนข้อความให้สตรีมเมอร์ (ไม่จำเป็น)"
            maxlength="200"
          ></textarea>
        </div>

        <button type="submit" class="btn-submit">สร้าง QR Code</button>
      </form>

      <div id="qrContainer" class="qr-container" style="display: none;">
        <h2>📱 สแกน QR Code เพื่อชำระเงิน</h2>
        <div id="qrCode" class="qr-code"></div>
        <div class="donation-info">
          <p><strong>ชื่อ:</strong> <span id="infoName"></span></p>
          <p><strong>จำนวนเงิน:</strong> <span id="infoAmount"></span> บาท</p>
          <p><strong>ข้อความ:</strong> <span id="infoMessage"></span></p>
        </div>
        <p class="waiting-status">⏳ รอการชำระเงิน...</p>
        <button type="button" class="btn-reset" onclick="resetForm()">โดเนทอีกครั้ง</button>
      </div>
    </main>
  </div>

  <script src="donation.js"></script>
</body>
</html>
