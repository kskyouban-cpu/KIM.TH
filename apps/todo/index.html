<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KIM.TH Todo List - สิ่งที่ต้องทำ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>📝 KIM.TH Todo List</h1>
      <p>จัดการสิ่งที่ต้องทำด้วยสตรีมเมอร์</p>
    </header>

    <main class="main-content">
      <!-- Input Section -->
      <section class="input-section">
        <div class="input-group">
          <input
            type="text"
            id="todoInput"
            class="todo-input"
            placeholder="เพิ่มสิ่งที่ต้องทำใหม่..."
            autocomplete="off"
          >
          <button id="addBtn" class="add-btn">➕ เพิ่ม</button>
        </div>
      </section>

      <!-- Filter Section -->
      <section class="filter-section">
        <button class="filter-btn active" data-filter="all">ทั้งหมด</button>
        <button class="filter-btn" data-filter="active">กำลังทำ</button>
        <button class="filter-btn" data-filter="completed">เสร็จแล้ว</button>
        <button class="filter-btn" data-filter="important">⭐ สำคัญ</button>
      </section>

      <!-- Stats Section -->
      <section class="stats-section">
        <div class="stat-item">
          <span class="stat-label">ทั้งหมด:</span>
          <span class="stat-value" id="totalTodos">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">เสร็จแล้ว:</span>
          <span class="stat-value" id="completedTodos">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">กำลังทำ:</span>
          <span class="stat-value" id="activeTodos">0</span>
        </div>
      </section>

      <!-- Todo List Section -->
      <section class="todo-list-section">
        <ul id="todoList" class="todo-list">
          <!-- Todos will be added here dynamically -->
        </ul>
        <div id="emptyState" class="empty-state">
          <p>🎉 ยังไม่มีรายการ! เพิ่มสิ่งที่ต้องทำใหม่เลย</p>
        </div>
      </section>

      <!-- Action Buttons -->
      <section class="action-section">
        <button id="clearCompletedBtn" class="action-btn danger">🗑️ ลบรายการที่เสร็จแล้ว</button>
        <button id="clearAllBtn" class="action-btn warning">⚠️ ลบทั้งหมด</button>
        <button id="exportBtn" class="action-btn info">📥 ส่งออก</button>
      </section>
    </main>

    <footer class="footer">
      <p>✨ Local Storage ช่วยให้ข้อมูลของคุณอยู่ปลอดภัยในเบราว์เซอร์</p>
    </footer>
  </div>

  <!-- Modal for Confirmation -->
  <div id="confirmModal" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle">ยืนยันการลบ</h2>
      <p id="modalMessage">คุณแน่ใจหรือไม่?</p>
      <div class="modal-buttons">
        <button id="confirmBtn" class="modal-btn confirm">ยืนยัน</button>
        <button id="cancelBtn" class="modal-btn cancel">ยกเลิก</button>
      </div>
    </div>
  </div>

  <script src="todo.js"></script>
</body>
</html>
